<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Campus Nexus</title>
    <script src="/app-settings.js"></script>
    <link rel="stylesheet" href="/css/campus-nexus-theme.css">
    <link rel="stylesheet" href="/css/brand-logo.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/nav-highlight.css">
    <link rel="stylesheet" href="/css/footer.css">
</head>
<body class="with-shared-header">
<div id="site-header-mount"></div>

<main class="container">
    <section class="card" style="max-width:640px;">
        <h1>My Profile</h1>
        <p id="profile-status">Loading your account...</p>
        <dl id="profile-details" class="hidden">
            <dt>User ID</dt>
            <dd id="profile-user-id"></dd>
            <dt>Name</dt>
            <dd id="profile-name"></dd>
            <dt>Email</dt>
            <dd id="profile-email"></dd>
            <dt>Role</dt>
            <dd id="profile-role"></dd>
        </dl>
        <div class="actions">
            <a class="button" href="/resource.html">Browse Resources</a>
            <button id="logout-button" type="button" class="secondary">Sign Out</button>
        </div>
    </section>
</main>

<div id="site-footer"></div>

<script>
    (async function () {
        const status = document.getElementById("profile-status");
        const details = document.getElementById("profile-details");

        function clearUser() {
            try {
                localStorage.removeItem("smartCampusUser");
            } catch (_) {}
        }

        document.getElementById("logout-button").addEventListener("click", async function () {
            clearUser();
            try {
                await fetch("/api/auth/logout", { method: "POST", credentials: "include" });
            } catch (_) {}
            window.location.href = "/login.html";
        });

        try {
            const response = await fetch("/api/auth/me", { credentials: "include" });
            if (!response.ok) throw new Error("Not signed in");
            const user = await response.json();
            localStorage.setItem("smartCampusUser", JSON.stringify(user));
            document.getElementById("profile-user-id").textContent = user.userId ?? "-";
            document.getElementById("profile-name").textContent = user.name ?? "-";
            document.getElementById("profile-email").textContent = user.email ?? "-";
            document.getElementById("profile-role").textContent = user.role ?? "-";
            details.classList.remove("hidden");
            status.textContent = "Signed in successfully.";
        } catch (_) {
            clearUser();
            status.textContent = "You are not signed in.";
        }
    })();
</script>
<script>
    fetch("/footer.html").then((response) => response.ok ? response.text() : "").then((html) => {
        const mount = document.getElementById("site-footer");
        if (mount) mount.innerHTML = html;
    }).catch(() => {});
</script>
<script src="/js/header-loader.js"></script>
<script src="/nav-highlight.js"></script>
</body>
</html>

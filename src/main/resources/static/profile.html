<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Campus Orbit</title>

    <script src="/app-settings.js"></script>
    <link rel="stylesheet" href="/css/campus-nexus-theme.css">
    <link rel="stylesheet" href="/css/profile.css">
    <link rel="stylesheet" href="/css/brand-logo.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/nav-highlight.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/notification-bell.css">

    <style>
        * {
            box-sizing: border-box;
        }

        body.with-shared-header {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            background:
                    radial-gradient(circle at top left, rgba(59, 130, 246, 0.22), transparent 35%),
                    radial-gradient(circle at bottom right, rgba(38, 70, 83, 0.24), transparent 35%),
                    linear-gradient(135deg, #f8fbff 0%, #eef6ff 45%, #f7fbff 100%);
            color: #1f2937;
            overflow-x: hidden;
        }

        body.with-shared-header::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                    linear-gradient(rgba(255, 255, 255, 0.45) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255, 255, 255, 0.45) 1px, transparent 1px);
            background-size: 44px 44px;
            pointer-events: none;
            opacity: 0.45;
            z-index: 0;
        }

        #site-header-mount {
            position: relative;
            z-index: 9999;
        }

        #site-footer {
            position: relative;
            z-index: 10;
        }

        header.top-nav,
        .top-nav {
            position: relative;
            z-index: 9999;
        }

        #nav-notify-wrap {
            position: relative !important;
            z-index: 10000 !important;
        }

        #nav-notify-wrap .notification-panel,
        #nav-notify-wrap .notifications-panel,
        #nav-notify-wrap .notification-dropdown,
        #nav-notify-wrap [class*="notification"][class*="panel"],
        #nav-notify-wrap [class*="notification"][class*="dropdown"] {
            position: absolute !important;
            top: calc(100% + 12px) !important;
            right: 0 !important;
            width: 460px !important;
            min-width: 460px !important;
            max-width: calc(100vw - 32px) !important;
            border-radius: 16px !important;
            background: rgba(255, 255, 255, 0.96) !important;
            border: 1px solid #dbe7ee !important;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.22) !important;
            overflow: hidden !important;
            z-index: 10001 !important;
            backdrop-filter: blur(16px);
        }

        #nav-notify-wrap .notification-panel *,
        #nav-notify-wrap .notifications-panel *,
        #nav-notify-wrap .notification-dropdown *,
        #nav-notify-wrap [class*="notification"][class*="panel"] *,
        #nav-notify-wrap [class*="notification"][class*="dropdown"] * {
            box-sizing: border-box;
        }

        #nav-notify-wrap .notification-panel header,
        #nav-notify-wrap .notifications-panel header,
        #nav-notify-wrap .notification-dropdown header,
        #nav-notify-wrap [class*="notification"][class*="panel"] header,
        #nav-notify-wrap [class*="notification"][class*="dropdown"] header {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            gap: 12px !important;
            padding: 16px 18px !important;
            background: #ffffff !important;
            border-bottom: 1px solid #dbe7ee !important;
            white-space: nowrap !important;
        }

        #nav-notify-wrap .notification-panel h1,
        #nav-notify-wrap .notification-panel h2,
        #nav-notify-wrap .notification-panel h3,
        #nav-notify-wrap .notifications-panel h1,
        #nav-notify-wrap .notifications-panel h2,
        #nav-notify-wrap .notifications-panel h3,
        #nav-notify-wrap .notification-dropdown h1,
        #nav-notify-wrap .notification-dropdown h2,
        #nav-notify-wrap .notification-dropdown h3,
        #nav-notify-wrap [class*="notification"][class*="panel"] h1,
        #nav-notify-wrap [class*="notification"][class*="panel"] h2,
        #nav-notify-wrap [class*="notification"][class*="panel"] h3,
        #nav-notify-wrap [class*="notification"][class*="dropdown"] h1,
        #nav-notify-wrap [class*="notification"][class*="dropdown"] h2,
        #nav-notify-wrap [class*="notification"][class*="dropdown"] h3 {
            margin: 0 !important;
            font-size: 18px !important;
            font-weight: 900 !important;
            color: #132238 !important;
            letter-spacing: -0.02em !important;
        }

        #nav-notify-wrap .notification-actions,
        #nav-notify-wrap .notifications-actions,
        #nav-notify-wrap [class*="notification"][class*="actions"] {
            display: flex !important;
            justify-content: flex-end !important;
            align-items: center !important;
            gap: 10px !important;
            padding: 12px !important;
            background: #f8fafc !important;
            border-top: 1px solid #dbe7ee !important;
            flex-wrap: nowrap !important;
        }

        #nav-notify-wrap button {
            white-space: nowrap !important;
        }

        #nav-notify-wrap .notification-actions button,
        #nav-notify-wrap .notifications-actions button,
        #nav-notify-wrap [class*="notification"][class*="actions"] button {
            width: auto !important;
            min-width: 92px !important;
            min-height: 42px !important;
            padding: 10px 14px !important;
            border-radius: 10px !important;
            border: 0 !important;
            color: #ffffff !important;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6) !important;
            font-size: 13px !important;
            font-weight: 900 !important;
            box-shadow: none !important;
        }

        #nav-notify-wrap .notification-list,
        #nav-notify-wrap .notifications-list,
        #nav-notify-wrap [class*="notification"][class*="list"] {
            max-height: 320px !important;
            overflow-y: auto !important;
            background: #ffffff !important;
        }

        #nav-notify-wrap .notification-empty,
        #nav-notify-wrap .notifications-empty,
        #nav-notify-wrap [class*="notification"][class*="empty"] {
            padding: 26px 18px !important;
            text-align: center !important;
            color: #334155 !important;
            font-size: 15px !important;
        }

        .profile-page {
            position: relative;
            z-index: 1;
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 120px 0 70px;
            display: grid;
            gap: 28px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            box-shadow:
                    0 28px 70px rgba(15, 23, 42, 0.13),
                    inset 0 1px 0 rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(18px);
        }

        .profile-card {
            padding: 42px;
            overflow: visible;
        }

        .settings-card {
            padding: 34px 42px;
        }

        .profile-card h2,
        .settings-card h2 {
            margin: 0;
            font-size: 32px;
            line-height: 1.1;
            font-weight: 900;
            letter-spacing: -0.055em;
            color: #132238;
        }

        .subtitle {
            margin: 12px 0 30px;
            color: #64748b;
            font-size: 16px;
            line-height: 1.6;
        }

        .profile-card__body {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 38px;
            align-items: start;
        }

        .profile-card__column--details {
            min-width: 0;
        }

        .profile-card__column--photo {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 26px;
        }

        .profile-avatar-top {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 28px;
            border-radius: 28px;
            background:
                    linear-gradient(135deg, rgba(59, 130, 246, 0.14), rgba(23, 50, 77, 0.10)),
                    rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(216, 228, 231, 0.9);
        }

        .profile-avatar-wrap {
            position: relative;
            width: 190px;
            height: 190px;
            border-radius: 50%;
            padding: 8px;
            background: linear-gradient(135deg, #3b82f6, #1e3a8a);
            box-shadow: 0 22px 42px rgba(59, 130, 246, 0.24);
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            background: #ffffff;
            border: 5px solid #ffffff;
        }

        .avatar-edit-btn {
            position: absolute;
            right: 10px;
            bottom: 12px;
            width: 46px;
            height: 46px;
            border: 0;
            border-radius: 50%;
            color: #ffffff;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.25);
            cursor: pointer;
            font-size: 18px;
            transition: 0.25s ease;
        }

        .avatar-edit-btn:hover {
            transform: translateY(-2px) scale(1.04);
        }

        .grid {
            display: grid;
            gap: 18px;
        }

        .profile-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        label {
            display: grid;
            gap: 8px;
            font-size: 13px;
            font-weight: 800;
            color: #334155;
        }

        input,
        select {
            width: 100%;
            padding: 14px 15px;
            border-radius: 15px;
            border: 1px solid #dbe7f5;
            background: rgba(255, 255, 255, 0.94);
            color: #111827;
            font-size: 15px;
            outline: none;
            transition: 0.25s ease;
        }

        input::placeholder {
            color: #94a3b8;
        }

        input:focus,
        select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14);
            background: #ffffff;
        }

        input:read-only,
        input:disabled {
            background: rgba(241, 245, 249, 0.85);
            color: #64748b;
            cursor: not-allowed;
        }

        select {
            cursor: pointer;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
            align-items: center;
        }

        button,
        .btn-secondary {
            border: 0;
            padding: 13px 18px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            text-decoration: none;
            transition: 0.25s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
        }

        button:not(.avatar-edit-btn):not(.auth-tab),
        #edit-profile-btn,
        #save-profile-btn,
        #logout-btn,
        #save-settings-btn,
        #backup-settings-btn {
            color: #ffffff;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            box-shadow: 0 16px 35px rgba(59, 130, 246, 0.22);
        }

        button:not(.avatar-edit-btn):hover,
        .btn-secondary:hover {
            transform: translateY(-2px);
        }

        .btn-secondary,
        #restore-settings-btn {
            color: #1e3a8a !important;
            background: rgba(255, 255, 255, 0.86) !important;
            border: 1px solid #dbe7f5 !important;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08) !important;
        }

        #logout-btn {
            background: linear-gradient(135deg, #334155, #0f172a);
        }

        .status-text {
            min-height: 22px;
            margin: 16px 0 0;
            font-size: 14px;
            font-weight: 800;
            color: #3b82f6;
        }

        .settings-card .grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .settings-kbd-hint {
            margin: -10px 0 18px;
            color: #64748b;
            font-size: 13px;
        }

        kbd {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 26px;
            padding: 4px 7px;
            border-radius: 7px;
            background: #eff6ff;
            border: 1px solid #dbe7f5;
            color: #1e3a8a;
            font-size: 12px;
            font-weight: 900;
            box-shadow: inset 0 -1px 0 rgba(15, 23, 42, 0.08);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 900px) {
            #nav-notify-wrap .notification-panel,
            #nav-notify-wrap .notifications-panel,
            #nav-notify-wrap .notification-dropdown,
            #nav-notify-wrap [class*="notification"][class*="panel"],
            #nav-notify-wrap [class*="notification"][class*="dropdown"] {
                right: -80px !important;
                width: 420px !important;
                min-width: 420px !important;
            }

            .profile-card__body {
                grid-template-columns: 1fr;
            }

            .profile-card__column--photo {
                order: -1;
                padding-top: 0;
            }

            .profile-avatar-top {
                max-width: 340px;
                margin: 0 auto;
            }

            .settings-card .grid,
            .profile-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            #nav-notify-wrap .notification-panel,
            #nav-notify-wrap .notifications-panel,
            #nav-notify-wrap .notification-dropdown,
            #nav-notify-wrap [class*="notification"][class*="panel"],
            #nav-notify-wrap [class*="notification"][class*="dropdown"] {
                position: fixed !important;
                top: 82px !important;
                left: 12px !important;
                right: 12px !important;
                width: auto !important;
                min-width: 0 !important;
                max-width: none !important;
            }

            #nav-notify-wrap .notification-actions,
            #nav-notify-wrap .notifications-actions,
            #nav-notify-wrap [class*="notification"][class*="actions"] {
                flex-wrap: wrap !important;
            }

            #nav-notify-wrap .notification-actions button,
            #nav-notify-wrap .notifications-actions button,
            #nav-notify-wrap [class*="notification"][class*="actions"] button {
                flex: 1 1 auto !important;
            }

            .profile-page {
                width: min(100% - 24px, 1180px);
                padding-top: 105px;
            }

            .profile-card,
            .settings-card {
                padding: 26px 20px;
                border-radius: 24px;
            }

            .profile-card h2,
            .settings-card h2 {
                font-size: 28px;
            }

            .actions {
                flex-direction: column;
                align-items: stretch;
            }

            .actions button,
            .actions a {
                width: 100%;
            }

            .profile-avatar-wrap {
                width: 160px;
                height: 160px;
            }
        }
    </style>
</head>

<body class="with-shared-header">
<div id="site-header-mount"></div>

<main class="container profile-page">
    <section class="card profile-card">
        <h2>My Profile</h2>
        <p class="subtitle">Logged in user details</p>

        <div class="profile-card__body">
            <div class="profile-card__column profile-card__column--details">
                <div id="profile-details" class="grid profile-grid"></div>
                <p id="profile-status" class="status-text"></p>

                <div class="actions">
                    <button id="edit-profile-btn" type="button">Edit Profile</button>
                    <button id="save-profile-btn" type="button" class="hidden">Update Profile</button>
                    <a class="btn-secondary" href="/">Back to Home</a>
                    <button id="logout-btn" type="button">Log Out</button>
                </div>
            </div>

            <div class="profile-card__column profile-card__column--photo">
                <div class="profile-avatar-top">
                    <div class="profile-avatar-wrap">
                        <img id="profile-preview" class="profile-avatar" src="https://via.placeholder.com/140?text=Profile" alt="Profile image">
                        <button id="avatar-edit-btn" class="avatar-edit-btn" type="button" aria-label="Update profile image">&#9998;</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="card settings-card">
        <h2>System Settings</h2>
        <p class="subtitle">These settings apply across all pages in the system.</p>
        <p class="settings-kbd-hint" id="settings-kbd-hint" hidden></p>

        <div class="grid">
            <label>Theme
                <select id="theme-setting">
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                </select>
            </label>

            <label>Font Size
                <select id="font-size-setting">
                    <option value="small">Small</option>
                    <option value="medium">Medium</option>
                    <option value="large">Large</option>
                </select>
            </label>

            <label>Font Style
                <select id="font-style-setting">
                    <option value="dmSans">DM Sans</option>
                    <option value="inter">Inter</option>
                    <option value="serif">Serif</option>
                    <option value="system">System UI</option>
                </select>
            </label>
        </div>

        <div class="actions">
            <button id="save-settings-btn" type="button">Save Settings</button>
            <button id="backup-settings-btn" type="button">Backup</button>
            <button id="restore-settings-btn" type="button" class="btn-secondary">Restore</button>
            <input id="restore-file-input" class="hidden" type="file" accept=".json,application/json">
        </div>

        <p id="settings-status" class="status-text"></p>
    </section>
</main>

<div id="site-footer"></div>

<script>
    const profileDetails = document.getElementById("profile-details");
    const profileStatus = document.getElementById("profile-status");
    let currentUser = null;

    function navHomeEl() {
        return document.querySelector("header.top-nav nav > a[href='/']");
    }

    function navResourcesEl() {
        return document.querySelector("header.top-nav nav > a[href='/resource.html']");
    }

    function syncAccountLinkFromUser(user) {
        const accountLink = document.getElementById("account-link");
        if (!accountLink || !user) {
            return;
        }
        const navAvatarSrc =
            user.profileImageData && user.profileImageData.startsWith("data:")
                ? user.profileImageData
                : "https://via.placeholder.com/24?text=P";
        accountLink.innerHTML =
            '<img class="nav-cta-avatar" src="' +
            navAvatarSrc +
            '" alt="" width="24" height="24" decoding="async">My Profile';
        accountLink.href = "/profile.html";
    }

    function initNavForRole() {
        const raw = localStorage.getItem("smartCampusUser");
        const navHomeLink = navHomeEl();
        const navResourcesLink = navResourcesEl();
        const navTechDashboardLink = document.getElementById("nav-tech-dashboard-link");
        if (!raw || !navHomeLink) {
            return;
        }
        try {
            const u = JSON.parse(raw);
            if (u.role === "ADMIN") {
                navHomeLink.href = "/admin.html";
                navHomeLink.textContent = "Dashboard";
                if (navResourcesLink) {
                    navResourcesLink.style.display = "none";
                }
            }
            if (u.role === "TECHNICIAN") {
                navHomeLink.style.display = "none";
                if (navResourcesLink) {
                    navResourcesLink.style.display = "none";
                }
                if (navTechDashboardLink) {
                    navTechDashboardLink.style.display = "";
                }
            }
            var ticketLink = document.querySelector("header.top-nav nav > a[href='/ticket.html']");
            var notifyWrap = document.getElementById("nav-notify-wrap");
            var isTech = u.role === "TECHNICIAN";
            if (ticketLink) {
                ticketLink.style.display = isTech ? "none" : "";
            }
            if (notifyWrap) {
                notifyWrap.style.display = isTech ? "none" : "";
            }
        } catch (_) {
        }
    }

    document.addEventListener("siteheaderloaded", function () {
        initNavForRole();
        if (currentUser) {
            syncAccountLinkFromUser(currentUser);
        }
    });

    const avatarEditBtn = document.getElementById("avatar-edit-btn");
    const editProfileBtn = document.getElementById("edit-profile-btn");
    const saveProfileBtn = document.getElementById("save-profile-btn");
    const logoutBtn = document.getElementById("logout-btn");
    const themeSetting = document.getElementById("theme-setting");
    const fontSizeSetting = document.getElementById("font-size-setting");
    const fontStyleSetting = document.getElementById("font-style-setting");
    const saveSettingsBtn = document.getElementById("save-settings-btn");
    const backupSettingsBtn = document.getElementById("backup-settings-btn");
    const restoreSettingsBtn = document.getElementById("restore-settings-btn");
    const restoreFileInput = document.getElementById("restore-file-input");
    const settingsStatus = document.getElementById("settings-status");
    let isEditMode = false;

    async function fetchProfileFromDatabase(user) {
        const uid = user.userId;
        if (uid == null || uid === 0) {
            console.log("No valid user ID, returning local user data");
            return user;
        }
        try {
            const res = await fetch(`/api/users/${uid}`);
            if (!res.ok) {
                if (res.status === 404) {
                    console.warn("User not found in database");
                } else if (res.status === 401) {
                    console.warn("Unauthorized access to user data");
                } else {
                    console.warn(`API error: ${res.status} ${res.statusText}`);
                }
                return user;
            }
            const p = await res.json();
            return {
                ...user,
                userId: p.userId,
                firstName: p.firstName ?? "",
                lastName: p.lastName ?? "",
                fullName: p.fullName,
                email: p.email,
                contactNumber: p.contactNumber ?? "",
                address: p.address ?? "",
                profileImageData: p.profileImageData
            };
        } catch (error) {
            console.error("Network error fetching profile:", error);
            return user;
        }
    }

    function escAttr(value) {
        return String(value ?? "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
    }

    function renderProfileUi(user) {
        syncAccountLinkFromUser(user);
        const nameParts = (user.fullName || "").trim().split(/\s+/).filter(Boolean);
        const firstName = user.firstName || nameParts[0] || "";
        const lastName = user.lastName || nameParts.slice(1).join(" ") || "";
        
        // Ensure we have some data to display
        if (!user.email && !user.fullName) {
            profileStatus.textContent = "No user data available. Please sign in again.";
            return;
        }
        
        profileDetails.innerHTML = `
                <label>User ID
                    <input type="text" value="${escAttr(user.userId || 'N/A')}" readonly>
                </label>
                <label>First Name
                    <input id="first-name" class="editable-field" type="text" value="${escAttr(firstName)}" disabled>
                </label>
                <label>Last Name
                    <input id="last-name" class="editable-field" type="text" value="${escAttr(lastName)}" disabled>
                </label>
                <label>Email
                    <input type="text" value="${escAttr(user.email || 'N/A')}" readonly>
                </label>
                <label>Contact Number
                    <input id="contact-number" class="editable-field" type="tel" value="${escAttr(user.contactNumber)}" placeholder="+94 77 123 4567" disabled>
                </label>
                <label>Address
                    <input id="address" class="editable-field" type="text" value="${escAttr(user.address)}" placeholder="Enter your address" disabled>
                </label>
                <label>Profile Image
                    <input id="profile-image-file" class="hidden" type="file" accept="image/*">
                </label>
            `;
        const profilePreview = document.getElementById("profile-preview");
        const imgSrc =
            user.profileImageData && user.profileImageData.startsWith("data:")
                ? user.profileImageData
                : "https://via.placeholder.com/140?text=Profile";
        profilePreview.src = imgSrc;
        delete profilePreview.dataset.uploadedImage;

        const profileImageInput = document.getElementById("profile-image-file");
        avatarEditBtn.onclick = () => profileImageInput.click();
        profileImageInput.onchange = () => {
            const file = profileImageInput.files && profileImageInput.files[0];
            if (!file) {
                return;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                const imageData = event.target && event.target.result ? String(event.target.result) : "";
                profilePreview.src = imageData || "https://via.placeholder.com/120?text=Profile";
                profilePreview.dataset.uploadedImage = imageData;
                currentUser = { ...currentUser, profileImageData: imageData };
                localStorage.setItem("smartCampusUser", JSON.stringify(currentUser));
                syncAccountLinkFromUser(currentUser);
                profileStatus.textContent = "Image ready - click Update Profile to save to the database.";
            };
            reader.readAsDataURL(file);
        };
        setEditMode(false);
    }

    function setEditMode(enabled) {
        isEditMode = enabled;
        const editableInputs = profileDetails.querySelectorAll(".editable-field");
        editableInputs.forEach((input) => {
            input.disabled = !enabled;
        });
        saveProfileBtn.classList.toggle("hidden", !enabled);
        editProfileBtn.classList.toggle("hidden", enabled);
    }

    // Check server connectivity first
    async function checkServerConnectivity() {
        try {
            const response = await fetch('/api/auth/status', { 
                method: 'GET',
                timeout: 5000 
            });
            return response.status !== 0; // Any response means server is reachable
        } catch (error) {
            return false;
        }
    }

    const userRaw = localStorage.getItem("smartCampusUser");
    if (!userRaw) {
        profileStatus.textContent = "You are not signed in. Please log in to view your profile.";
        avatarEditBtn.disabled = true;
        editProfileBtn.disabled = true;
        saveProfileBtn.disabled = true;
        // Add login button
        const loginBtn = document.createElement("button");
        loginBtn.textContent = "Sign In";
        loginBtn.className = "btn-secondary";
        loginBtn.onclick = () => window.location.href = "/login.html";
        editProfileBtn.parentNode.insertBefore(loginBtn, editProfileBtn);
    } else {
        (async () => {
            try {
                // Check server connectivity first
                const isServerReachable = await checkServerConnectivity();
                if (!isServerReachable) {
                    profileStatus.textContent = "Cannot connect to server. Please check your internet connection and try again.";
                    // Still try to show local data
                    let user = JSON.parse(userRaw);
                    if (user && user.email) {
                        renderProfileUi(user);
                        profileStatus.textContent += " Showing cached profile data.";
                    }
                    return;
                }

                let user = JSON.parse(userRaw);
                if (!user || !user.email) {
                    throw new Error("Invalid user data");
                }
                
                // Show loading state
                profileStatus.textContent = "Loading your profile...";
                
                user = await fetchProfileFromDatabase(user);
                currentUser = user;
                localStorage.setItem("smartCampusUser", JSON.stringify(user));
                renderProfileUi(user);
                profileStatus.textContent = "Profile loaded successfully.";
            } catch (error) {
                console.error("Profile loading error:", error);
                localStorage.removeItem("smartCampusUser");
                if (window.SmartCampusResourceApi && typeof window.SmartCampusResourceApi.clearCredentials === "function") {
                    window.SmartCampusResourceApi.clearCredentials();
                }
                profileStatus.textContent = "Session expired. Please sign in again.";
                avatarEditBtn.disabled = true;
                editProfileBtn.disabled = true;
                saveProfileBtn.disabled = true;
                
                // Add login button
                const loginBtn = document.createElement("button");
                loginBtn.textContent = "Sign In Again";
                loginBtn.className = "btn-secondary";
                loginBtn.onclick = () => window.location.href = "/login.html";
                editProfileBtn.parentNode.insertBefore(loginBtn, editProfileBtn);
            }
        })();
    }

    editProfileBtn.addEventListener("click", () => {
        if (!currentUser) {
            return;
        }
        setEditMode(true);
        profileStatus.textContent = "Edit mode enabled.";
    });

    saveProfileBtn.addEventListener("click", async () => {
        if (!currentUser || !isEditMode) {
            return;
        }

        const firstName = document.getElementById("first-name").value.trim();
        const lastName = document.getElementById("last-name").value.trim();
        const fullName = `${firstName} ${lastName}`.trim();
        const contactNumber = document.getElementById("contact-number").value.trim();
        const address = document.getElementById("address").value.trim();
        const profilePreview = document.getElementById("profile-preview");
        let imagePayload = null;
        if (profilePreview.dataset.uploadedImage && profilePreview.dataset.uploadedImage.startsWith("data:")) {
            imagePayload = profilePreview.dataset.uploadedImage;
        } else if (currentUser.profileImageData && currentUser.profileImageData.startsWith("data:")) {
            imagePayload = currentUser.profileImageData;
        }

        const uid = currentUser.userId;
        const isDbUser = uid != null && uid !== 0;

        if (isDbUser) {
            profileStatus.textContent = "Saving to database...";
            try {
                const res = await fetch(`/api/users/${uid}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        firstName,
                        lastName,
                        contactNumber,
                        address,
                        profileImageData: imagePayload
                    })
                });
                const body = await res.json().catch(() => ({}));
                if (!res.ok) {
                    throw new Error(body.message || "Could not save profile");
                }
                currentUser = {
                    ...currentUser,
                    userId: body.userId,
                    firstName: body.firstName,
                    lastName: body.lastName,
                    fullName: body.fullName,
                    email: body.email,
                    contactNumber: body.contactNumber ?? "",
                    address: body.address ?? "",
                    profileImageData: body.profileImageData
                };
                localStorage.setItem("smartCampusUser", JSON.stringify(currentUser));
                renderProfileUi(currentUser);
                profileStatus.textContent = "Profile saved to the database (check phpMyAdmin → app_users).";
                return;
            } catch (err) {
                profileStatus.textContent = err.message || "Save failed.";
                return;
            }
        }

        const updatedUser = {
            ...currentUser,
            firstName,
            lastName,
            fullName,
            contactNumber,
            address,
            profileImageData: imagePayload || currentUser.profileImageData
        };
        localStorage.setItem("smartCampusUser", JSON.stringify(updatedUser));
        currentUser = updatedUser;
        renderProfileUi(currentUser);
        profileStatus.textContent = "Profile updated (local session only).";
    });

    logoutBtn.addEventListener("click", () => {
        localStorage.removeItem("smartCampusUser");
        if (window.SmartCampusResourceApi && typeof window.SmartCampusResourceApi.clearCredentials === "function") {
            window.SmartCampusResourceApi.clearCredentials();
        }
        window.location.href = "/login.html";
    });

    const settingsApi = window.SmartCampusSettings;
    if (settingsApi) {
        const currentSettings = settingsApi.load();
        themeSetting.value = currentSettings.theme;
        fontSizeSetting.value = currentSettings.fontSize;
        fontStyleSetting.value = currentSettings.fontStyle;
    }

    function runSaveSettings() {
        const settingsApiInner = window.SmartCampusSettings;
        if (!settingsApiInner) {
            settingsStatus.textContent = "Settings service is unavailable.";
            return;
        }
        settingsApiInner.save({
            theme: themeSetting.value,
            fontSize: fontSizeSetting.value,
            fontStyle: fontStyleSetting.value
        });
        settingsStatus.textContent = "Settings saved and applied system-wide.";
    }

    saveSettingsBtn.addEventListener("click", () => runSaveSettings());

    (function initSettingsShortcutHint() {
        const hintEl = document.getElementById("settings-kbd-hint");
        const plat = window.SmartCampusPlatform;
        if (!hintEl || !plat) {
            return;
        }
        const seq = plat.formatShortcut(["S"]);
        const parts = seq.split("+").map((p) => "<kbd>" + p + "</kbd>");
        hintEl.innerHTML = "Tip: Press " + parts.join(" + ") + " to save system settings.";
        hintEl.hidden = false;
    })();

    document.addEventListener("keydown", (e) => {
        if (!e.ctrlKey && !e.metaKey) {
            return;
        }
        if (String(e.key).toLowerCase() !== "s") {
            return;
        }
        const t = e.target;
        if (t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.tagName === "SELECT" || t.isContentEditable)) {
            return;
        }
        e.preventDefault();
        runSaveSettings();
    });

    backupSettingsBtn.addEventListener("click", () => {
        const payload = {
            smartCampusUser: localStorage.getItem("smartCampusUser"),
            smartCampusSettings: localStorage.getItem("smartCampusSettings"),
            exportedAt: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const downloadUrl = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = downloadUrl;
        anchor.download = "campus-orbit-backup.json";
        anchor.click();
        URL.revokeObjectURL(downloadUrl);
        settingsStatus.textContent = "Backup downloaded successfully.";
    });

    restoreSettingsBtn.addEventListener("click", () => {
        restoreFileInput.click();
    });

    restoreFileInput.addEventListener("change", () => {
        const file = restoreFileInput.files && restoreFileInput.files[0];
        if (!file) {
            return;
        }

        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const parsed = JSON.parse(String(event.target && event.target.result ? event.target.result : "{}"));
                if (typeof parsed.smartCampusUser === "string") {
                    localStorage.setItem("smartCampusUser", parsed.smartCampusUser);
                }
                if (typeof parsed.smartCampusSettings === "string") {
                    localStorage.setItem("smartCampusSettings", parsed.smartCampusSettings);
                    const settingsApiInner = window.SmartCampusSettings;
                    if (settingsApiInner) {
                        const restoredSettings = settingsApiInner.load();
                        settingsApiInner.apply(restoredSettings);
                        themeSetting.value = restoredSettings.theme;
                        fontSizeSetting.value = restoredSettings.fontSize;
                        fontStyleSetting.value = restoredSettings.fontStyle;
                    }
                }
                settingsStatus.textContent = "Restore completed. Reloading...";
                setTimeout(() => window.location.reload(), 600);
            } catch (_) {
                settingsStatus.textContent = "Invalid backup file. Please select a valid JSON backup.";
            }
        };
        reader.readAsText(file);
    });

    fetch("/footer.html")
        .then((response) => response.ok ? response.text() : "")
        .then((footerHtml) => {
            const footerContainer = document.getElementById("site-footer");
            if (footerContainer) footerContainer.innerHTML = footerHtml;
        })
        .catch(() => {});
</script>

<script src="/js/header-loader.js"></script>

<script>
    (function loadProfileNotificationBell() {
        function appendBell() {
            var s = document.createElement("script");
            s.src = "/js/notification-bell.js";
            document.body.appendChild(s);
        }
        try {
            var raw = localStorage.getItem("smartCampusUser");
            if (!raw) {
                appendBell();
                return;
            }
            if (JSON.parse(raw).role !== "TECHNICIAN") {
                appendBell();
            }
        } catch (_) {
            appendBell();
        }
    })();
</script>

<script src="/nav-highlight.js"></script>
</body>
</html>

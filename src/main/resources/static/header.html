<header class="top-nav">
  <style>
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      min-height: 82px;
      padding: 16px 34px;
      background: rgba(255, 255, 255, 0.86);
      border-bottom: 1px solid rgba(217, 229, 239, 0.9);
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
      backdrop-filter: blur(18px);
    }

    .top-nav .brand {
      display: inline-flex;
      align-items: center;
      gap: 13px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .top-nav .brand-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 14px;
      filter: drop-shadow(0 8px 14px rgba(15, 23, 42, 0.08));
    }

    .top-nav .brand-text {
      color: #0f2f6b;
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -0.025em;
      white-space: nowrap;
    }

    .top-nav nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .top-nav nav > a {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 14px;
      color: #334155;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      transition: 0.22s ease;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .top-nav nav > a:hover {
      color: #1d4ed8;
      background: #f6f9ff;
      border-color: #dbe7f5;
      transform: translateY(-1px);
    }

    .top-nav nav > a.active,
    .top-nav nav > a[aria-current="page"] {
      color: #ffffff;
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.15);
    }

    .top-nav .nav-cta {
      min-height: 44px;
      padding: 10px 18px;
      border-radius: 16px;
      color: #ffffff !important;
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.16);
      border: 0;
    }

    .top-nav .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(37, 99, 235, 0.22);
      background: linear-gradient(135deg, #0f2f6b, #2563eb);
    }

    .nav-cta-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 8px;
      border: 2px solid rgba(255, 255, 255, 0.85);
    }

    .nav-notify-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    .nav-notify-btn {
      position: relative;
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #dbe7f5;
      border-radius: 16px;
      background: #ffffff;
      color: #1d4ed8;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      transition: 0.22s ease;
    }

    .nav-notify-btn:hover {
      transform: translateY(-2px);
      border-color: #bfdbfe;
      background: #f6f9ff;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.10);
    }

    .nav-notify-btn .bell {
      font-size: 19px;
      line-height: 1;
    }

    .notify-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      background: #dc2626;
      border: 2px solid #ffffff;
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
      box-shadow: 0 8px 16px rgba(220, 38, 38, 0.25);
    }

    .notify-panel {
      position: absolute;
      top: calc(100% + 12px);
      right: 0;
      width: 440px;
      min-width: 440px;
      max-width: calc(100vw - 32px);
      overflow: hidden;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid #dbe7f5;
      box-shadow: 0 28px 70px rgba(15, 23, 42, 0.20);
      backdrop-filter: blur(18px);
      z-index: 10001;
    }

    .notify-head {
      display: grid;
      gap: 4px;
      padding: 18px 20px;
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: #ffffff;
    }

    .notify-head > span:first-child {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .notify-sub {
      color: rgba(255, 255, 255, 0.78);
      font-size: 13px;
      font-weight: 600;
    }

    .notify-list {
      max-height: 330px;
      overflow-y: auto;
      background: #ffffff;
    }

    .notify-item {
      padding: 15px 18px;
      border-bottom: 1px solid #eef3f7;
    }

    .notify-item-title {
      color: #1e293b;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.4;
    }

    .notify-item-meta {
      margin-top: 4px;
      color: #64748b;
      font-size: 12px;
      line-height: 1.5;
    }

    .notify-item-note {
      margin-top: 8px;
      color: #334155;
      font-size: 13px;
      line-height: 1.5;
    }

    .notify-empty {
      padding: 28px 18px;
      color: #64748b;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
    }

    .notify-foot {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 14px;
      background: #f8fbff;
      border-top: 1px solid #e5eefb;
    }

    .notify-foot button {
      min-height: 40px;
      padding: 9px 13px;
      border: 0;
      border-radius: 12px;
      color: #ffffff;
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .notify-foot button:hover {
      transform: translateY(-1px);
    }

    .notify-foot .notify-clear {
      background: linear-gradient(135deg, #475569, #1e293b);
    }

    @media (max-width: 980px) {
      .top-nav {
        align-items: flex-start;
        flex-direction: column;
        padding: 16px 22px;
      }

      .top-nav nav {
        width: 100%;
        justify-content: flex-start;
      }
    }

    @media (max-width: 640px) {
      .top-nav {
        padding: 14px 16px;
      }

      .top-nav .brand-text {
        font-size: 18px;
      }

      .top-nav nav {
        gap: 6px;
      }

      .top-nav nav > a {
        flex: 1 1 auto;
        font-size: 13px;
        padding: 10px 12px;
      }

      .top-nav .nav-cta {
        width: 100%;
      }

      .nav-notify-wrap {
        order: -1;
      }

      .notify-panel {
        position: fixed;
        top: 86px;
        left: 12px;
        right: 12px;
        width: auto;
        min-width: 0;
        max-width: none;
      }

      .notify-foot {
        flex-direction: column;
      }

      .notify-foot button {
        width: 100%;
      }
    }
  </style>

  <a href="/" class="brand" aria-label="Campus Orbit — Home">
    <img class="brand-logo" src="/images/campus-nexus-logo.png" width="48" height="48" alt="" loading="eager" decoding="async">
    <span class="brand-text">Campus Orbit</span>
  </a>

  <nav>
    <a href="/">Home</a>
    <a href="/resource.html">Resources</a>
    <a id="nav-booking-link" href="/book.html" style="display:none">My bookings</a>
    <a href="/ticket.html">Ticket</a>
    <a id="nav-tech-dashboard-link" href="/tech.html" style="display:none">Tech Dashboard</a>
    <a id="admin-nav-link" href="/admin.html">Admin</a>

    <div class="nav-notify-wrap" id="nav-notify-wrap">
      <button type="button" class="nav-notify-btn" id="notify-bell" aria-expanded="false" aria-haspopup="true" aria-label="Notifications">
        <span class="bell" aria-hidden="true">&#128276;</span>
        <span id="notify-badge" class="notify-badge" hidden>0</span>
      </button>

      <div id="notify-panel" class="notify-panel" hidden role="region" aria-label="Notification list">
        <div class="notify-head">
          <span>Notifications</span>
          <span class="notify-sub">Campus Orbit · ticket updates</span>
        </div>

        <div id="notify-list" class="notify-list"></div>

        <div class="notify-foot">
          <button type="button" id="notify-mark-read">Mark all read</button>
          <button type="button" id="notify-clear-all" class="notify-clear">Clear all</button>
        </div>
      </div>
    </div>

    <a id="account-link" class="nav-cta" href="/login.html">Login / Sign Up</a>
  </nav>
</header>

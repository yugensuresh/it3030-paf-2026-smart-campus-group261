<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Campus Orbit</title>

    <script src="/app-settings.js"></script>
    <link rel="stylesheet" href="/css/campus-nexus-theme.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/brand-logo.css">
    <link rel="stylesheet" href="/css/footer.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body.auth-page {
            min-height: 100vh;
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            color: #1e293b;
            overflow-x: hidden;
            position: relative;
            background: linear-gradient(-45deg, #e0e7ff, #c7d2fe, #f1f5f9, #e2e8f0);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body.auth-page::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle at center, rgba(255,255,255,0.8) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* --- Navbar / Brand Bar --- */
        .auth-brand-bar {
            position: fixed;
            top: 24px;
            left: 32px;
            z-index: 10;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px 10px 10px;
            text-decoration: none;
            border-radius: 99px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }

        .auth-brand-bar:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        .auth-brand-bar .brand-logo {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .auth-brand-bar .brand-text {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #0f172a;
        }

        /* --- Main Wrapper --- */
        .auth-wrapper {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
        }

        /* Decorative Background Blob */
        .auth-wrapper::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.3) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
            filter: blur(40px);
        }

        /* --- Main Auth Card --- */
        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 48px 40px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow:
                    0 20px 40px rgba(0, 0, 0, 0.04),
                    0 1px 3px rgba(0, 0, 0, 0.05),
                    inset 0 1px 0 rgba(255, 255, 255, 1);
            backdrop-filter: blur(24px) saturate(1.5);
            -webkit-backdrop-filter: blur(24px) saturate(1.5);
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 2;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- Typography --- */
        .auth-card h1 {
            margin-bottom: 8px;
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            letter-spacing: -0.04em;
            color: #0f172a;
        }

        .subtitle {
            margin-bottom: 32px;
            text-align: center;
            color: #64748b;
            font-size: 15px;
            line-height: 1.5;
            font-weight: 400;
        }

        /* --- iOS Style Toggle Tabs --- */
        .auth-toggle {
            display: flex;
            background: rgba(15, 23, 42, 0.05);
            padding: 6px;
            border-radius: 14px;
            margin-bottom: 32px;
            position: relative;
        }

        .auth-tab {
            flex: 1;
            border: none;
            padding: 12px;
            border-radius: 10px;
            background: transparent;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .auth-tab:hover {
            color: #1e293b;
        }

        .auth-tab.active {
            color: #0f172a;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.04);
            font-weight: 700;
        }

        /* --- Forms & Inputs --- */
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.7);
            color: #0f172a;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        input:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(0, 0, 0, 0.15);
        }

        input:focus {
            background: #ffffff;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        /* --- Buttons --- */
        .btn-primary {
            border: none;
            margin-top: 4px;
            padding: 16px;
            border-radius: 12px;
            color: #ffffff;
            background: #4f46e5;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.01em;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            background: linear-gradient(135deg, #6b7280 0%, #4338ca 100%); /* Subtle shift */
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3);
        }

        .full-width {
            width: 100%;
        }

        .hidden {
            display: none !important;
        }

        /* --- Footer & Status Text --- */
        .status-text {
            min-height: 20px;
            margin: 20px 0 8px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: #4f46e5;
        }

        .tiny-text {
            margin: 8px 0 16px;
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
        }

        .inline-link {
            display: block;
            width: fit-content;
            margin: 0 auto;
            color: #4f46e5;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .inline-link:hover {
            color: #312e81;
            text-decoration: underline;
        }

        #site-footer {
            position: relative;
            z-index: 1;
            padding-bottom: 20px;
        }

        /* --- Responsive Design --- */
        @media (max-width: 640px) {
            .auth-brand-bar {
                top: 16px;
                left: 16px;
                padding: 8px 16px 8px 8px;
            }

            .auth-card {
                padding: 40px 24px;
                border-radius: 24px;
            }

            .auth-card h1 {
                font-size: 28px;
            }

            .subtitle {
                font-size: 14px;
            }
        }
    </style>
</head>

<body class="auth-page">
<a href="/" class="auth-brand-bar" aria-label="Campus Orbit — Home">
    <img class="brand-logo" src="/images/campus-nexus-logo.png" width="36" height="36" alt="" decoding="async">
    <span class="brand-text">Campus Orbit</span>
</a>

<main class="auth-wrapper">
    <section class="auth-card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in or create an account to access Campus Orbit modules.</p>

        <div class="auth-toggle">
            <button id="signin-tab" class="auth-tab active" type="button">Sign In</button>
            <button id="signup-tab" class="auth-tab" type="button">Sign Up</button>
        </div>

        <form id="signin-form">
            <label>Email or username
                <input id="signin-email" type="text" placeholder="you@smartcampus.edu or admin username" required>
            </label>
            <label>Password
                <input id="signin-password" type="password" placeholder="Enter password" required>
            </label>
            <button type="submit" class="btn-primary full-width">Sign In</button>
        </form>

        <form id="signup-form" class="hidden">
            <label>Full Name
                <input id="signup-name" type="text" placeholder="Your full name" required>
            </label>
            <label>Email
                <input id="signup-email" type="email" placeholder="you@smartcampus.edu" required>
            </label>
            <label>Password
                <input id="signup-password" type="password" minlength="6" placeholder="Minimum 6 characters" required>
            </label>
            <button type="submit" class="btn-primary full-width">Create Account</button>
        </form>

        <p id="login-status" class="status-text"></p>
        <p class="tiny-text">Your account is saved in the project database.</p>
        <a class="inline-link" href="/">Back to Home</a>
    </section>
</main>

<div id="site-footer"></div>

<script>
    const signinTab = document.getElementById("signin-tab");
    const signupTab = document.getElementById("signup-tab");
    const signinForm = document.getElementById("signin-form");
    const signupForm = document.getElementById("signup-form");
    const loginStatus = document.getElementById("login-status");

    function setActiveTab(tab) {
        const isSignIn = tab === "signin";
        signinTab.classList.toggle("active", isSignIn);
        signupTab.classList.toggle("active", !isSignIn);
        signinForm.classList.toggle("hidden", !isSignIn);
        signupForm.classList.toggle("hidden", isSignIn);
        loginStatus.textContent = "";
    }

    signinTab.addEventListener("click", () => setActiveTab("signin"));
    signupTab.addEventListener("click", () => setActiveTab("signup"));

    signinForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        loginStatus.textContent = "Signing in...";

        try {
            const email = document.getElementById("signin-email").value.trim().toLowerCase();
            const password = document.getElementById("signin-password").value;

            const response = await fetch("/api/auth/signin", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    email,
                    password
                })
            });

            const body = await response.json();

            if (!response.ok) {
                throw new Error(body.message || "Sign in failed");
            }

            if (
                window.SmartCampusResourceApi &&
                typeof window.SmartCampusResourceApi.clearCredentials === "function"
            ) {
                window.SmartCampusResourceApi.clearCredentials();
            }

            localStorage.setItem("smartCampusUser", JSON.stringify(body));

            if (
                body.role === "ADMIN" &&
                window.SmartCampusResourceApi &&
                typeof window.SmartCampusResourceApi.rememberAdminCredentials === "function"
            ) {
                window.SmartCampusResourceApi.rememberAdminCredentials();
            }

            loginStatus.textContent = `Welcome, ${body.fullName}. Redirecting...`;

            setTimeout(() => {
                const params = new URLSearchParams(window.location.search);
                const nextParam = params.get("next");

                if (nextParam && nextParam.startsWith("/") && !nextParam.startsWith("//")) {
                    window.location.href = nextParam;
                    return;
                }

                const next = body.role === "ADMIN"
                    ? "/admin.html"
                    : (body.role === "TECHNICIAN" ? "/tech.html" : "/");

                window.location.href = next;
            }, 700);

        } catch (error) {
            loginStatus.textContent = error.message;
        }
    });

    signupForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        loginStatus.textContent = "Creating account...";

        try {
            const response = await fetch("/api/auth/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    fullName: document.getElementById("signup-name").value.trim(),
                    email: document.getElementById("signup-email").value.trim().toLowerCase(),
                    password: document.getElementById("signup-password").value
                })
            });

            const body = await response.json();

            if (!response.ok) {
                throw new Error(body.message || "Sign up failed");
            }

            loginStatus.textContent = "Sign up successful. Please sign in.";
            signupForm.reset();
            setActiveTab("signin");
            document.getElementById("signin-email").value = body.email;

        } catch (error) {
            loginStatus.textContent = error.message;
        }
    });

    fetch("/footer.html")
        .then((response) => response.ok ? response.text() : "")
        .then((footerHtml) => {
            const footerContainer = document.getElementById("site-footer");
            if (footerContainer) {
                footerContainer.innerHTML = footerHtml;
            }
        })
        .catch(() => {});
</script>
</body>
</html>

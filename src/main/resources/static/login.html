<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in | Campus Nexus</title>
    <script src="/app-settings.js"></script>
    <link rel="stylesheet" href="/css/campus-nexus-theme.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/footer.css">
</head>
<body class="with-shared-header">
<div id="site-header-mount"></div>
<main class="container">
    <section class="card" style="max-width:520px;margin:40px auto;">
        <h1>Sign in to Campus Nexus</h1>
        <p>Use your Google account to continue.</p>
        <button id="google-login" type="button">Continue with Google</button>
        <p id="login-note" style="margin-top:14px;color:#555;"></p>
    </section>
</main>
<div id="site-footer"></div>
<script>
    (function () {
        const params = new URLSearchParams(window.location.search);
        const next = params.get("next") || "/resource.html";
        sessionStorage.setItem("smartCampusNextUrl", next);
        document.getElementById("google-login").addEventListener("click", function () {
            window.location.href = "/oauth2/authorization/google";
        });
        document.getElementById("login-note").textContent = "After sign-in, you will be returned to " + next;
    })();
</script>
<script>
    fetch("/footer.html").then((r) => r.ok ? r.text() : "").then((html) => {
        const mount = document.getElementById("site-footer");
        if (mount) mount.innerHTML = html;
    }).catch(() => {});
</script>
<script src="/js/header-loader.js"></script>
</body>
</html>
